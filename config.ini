[DATABASE]
# MySQL Database configuration
host = 192.168.100.101
port = 3306
user = ibosoftnet_atc_datalink
password = Ankara2009**
database = ibosoftnet_atc_datalink

[BACKEND]
# Backend connection settings for frontend
host = 127.0.0.1
port = 10002

[LISTENER]
# TCP Server connection settings
host = 192.168.100.103
port = 15551
# Maximum idle time in seconds before reconnecting (default: 600 = 10 minutes)
max_idle_time = 600

[RECORDING]
# Maximum number of messages to keep in messages_json_raw table
max_messages = 100000

[LOGGING]
# Log file settings
max_log_size_mb = 10
backup_count = 2

[DECODING]
# ACARS message decoding settings
enabled = true

[ACARS_APP_API]
# HTTP API exposing ATS application messages to external (server-to-server)
# callers. Currently supports the 'datis' application; new applications
# (dcl, pdc, aoc, ...) can be added without changing this section.
# Authentication: X-API-Key header only (no JWT cookie).
enabled = true
host = 192.168.100.101
port = 10012
# Hard cap on how many messages may be returned per type within a request
# (e.g. dep/arr for D-ATIS). Caller-supplied count is clamped to this.
max_count_per_type = 5

[SECURITY]
# Connection-level authentication for /stream, /decode and /acars-app/* endpoints.
# /health endpoints remain open. Set enabled=false to bypass during migration.
enabled = true
# Static API keys for external (server-to-server) callers. Comma-separated.
# Sent by the caller as the X-API-Key HTTP header. Not used by browsers.
api_keys = Ankara2009
# Shared HS256 secret used to verify JWTs issued by atcweb.
# Must match DATALINK_JWT_SECRET in atcweb .htaccess.
jwt_secret = Ankara2009
# Cookie name carrying the JWT (browser flow).
jwt_cookie_name = datalink_session
